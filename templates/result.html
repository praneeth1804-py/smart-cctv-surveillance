<!DOCTYPE html>
<html>
<head>

<title>Detection Result</title>

<style>

body{
    background:#020617;
    color:white;
    text-align:center;
    font-family:Arial;
    margin:0;
}

.container{
    margin-top:50px;
}

video{
    margin-top:25px;
    border:4px solid #ef4444;
    border-radius:8px;
}

.alert{
    color:#ef4444;
    font-size:28px;
    margin-top:20px;
    font-weight:bold;
}

.safe{
    color:#22c55e;
    font-size:24px;
    margin-top:20px;
    font-weight:bold;
}

button{
    padding:12px 25px;
    background:#3b82f6;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:6px;
}

button:hover{
    background:#2563eb;
}

.footer{
    margin-top:40px;
    font-size:13px;
    color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<h1>📹 Processed Surveillance Output</h1>

{% if anomaly %}
<div class="alert">
🚨 Suspicious Activity Detected
</div>
{% else %}
<div class="safe">
✅ No Suspicious Activity Detected
</div>
{% endif %}

<video width="800" controls>
    <source src="{{ url_for('static', filename=video) }}">
</video>

<br><br>

<a href="/">
<button>Analyze Another Video</button>
</a>

</div>

<div class="footer">
Smart CCTV Surveillance System | AI-Based Motion Monitoring
</div>

</body>
</html>
